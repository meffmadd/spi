name: Build and Push pi-agent-runtime Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.github/workflows/build.yml'
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: meffmadd/pi-agent-runtime

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine pi version
        id: pi-ver
        run: |
          PI=$(npm view @earendil-works/pi-coding-agent version 2>/dev/null || echo "latest")
          echo "version=$PI" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Generate pi-versioned tags
        id: pi-tags
        run: |
          PI="${{ steps.pi-ver.outputs.version }}"
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref }}" == refs/tags/v* ]]; then
            SEMVER="${{ steps.meta.outputs.version }}"
            echo "tags=${REPO}:v${SEMVER}-pi-${PI}" >> $GITHUB_OUTPUT
          elif [ "$PI" != "latest" ]; then
            echo "tags=${REPO}:latest-pi-${PI}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          provenance: false
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.pi-tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PI_VERSION=${{ steps.pi-ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
